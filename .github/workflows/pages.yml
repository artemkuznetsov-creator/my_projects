name: Deploy multiple labs to Pages

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare files for deployment
        run: |
          mkdir -p ./_site
          
          # Копируем папки
          [ -d "Web" ] && cp -r "Web" ./_site/
          [ -d "Shop_site" ] && cp -r "Shop_site" ./_site/
          [ -d "Training" ] && cp -r "Training" ./_site/
          
          # Создаем простую HTML страницу
          echo '<!DOCTYPE html>
          <html>
          <head><title>Лабы</title></head>
          <body>
            <h1>Лабораторные работы</h1>
            <ul>
              <li><a href="Web/">Web</a></li>
              <li><a href="Shop_site/">Shop site</a></li>
              <li><a href="Training/">Training</a></li>
            </ul>
          </body>
          </html>' > ./_site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
