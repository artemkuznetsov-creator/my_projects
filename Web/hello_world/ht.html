    <canvas width='480' height='200' id="mycanvas"></canvas>
    <script>
        var canvas = document.getElementById('mycanvas');
        var ctx = canvas.getContext("2d");
        // ctx.fillStyle = "red";
        // ctx.fillRect(30,30,50,50);
        var x = 0;
        function myrepaint(){
            ctx.fillStyle = "white";
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "red";
            ctx.fillRect(x,-20,50, 50);
            ctx.fillStyle = "blue";
            ctx.fillRect(x+20, 20,50, 50);
            ctx.fillStyle = "green";
            ctx.fillRect(x-20,10,50,50);
            x++;
        }
        setInterval(myrepaint,3);


    </script>
