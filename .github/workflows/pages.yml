name: Deploy multiple labs to Pages

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare files for deployment
        run: |
          mkdir ./_site
          
          # Копируем папку Web
          if [ -d "Web" ]; then
            echo "Copying Web"
            cp -r "Web" ./_site/
          fi
          
          # Копируем папку Shop site (с пробелом!)
          if [ -d "Shop site" ]; then
            echo "Copying Shop site"
            cp -r "Shop site" ./_site/
          fi
          
          # Копируем папку Training
          if [ -d "Training" ]; then
            echo "Copying Training"
            cp -r "Training" ./_site/
          fi
          
          echo "Contents of _site:"
          ls -la ./_site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
