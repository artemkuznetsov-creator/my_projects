
name: Deploy multiple labs to Pages

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare files for deployment
        run: |
          mkdir ./_site
          # Копируем все папки с лабами в папку для публикации
          cp -r ./lab1 ./_site/
          cp -r ./lab2 ./_site/
          cp -r ./lab3 ./_site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
